<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>编排管理</h3>
        <a href="/page/pipeline/add" class="btn btn-primary">+ 新增编排</a>
    </div>

    <div th:if="${pipelines == null || pipelines.isEmpty()}" class="alert alert-info">
        暂无编排定义，请点击右上角按钮创建。
    </div>

    <table th:if="${pipelines != null && !pipelines.isEmpty()}" class="table table-striped">
        <thead>
            <tr>
                <th>编排名称</th>
                <th>标识</th>
                <th>调用路径</th>
                <th>描述</th>
                <th>状态</th>
                <th>创建时间</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="pipeline : ${pipelines}">
                <td th:text="${pipeline.pipelineName}"></td>
                <td><code th:text="${pipeline.pipelineCode}"></code></td>
                <td>
                    <small class="text-muted">
                        POST /api/pipeline/<span th:text="${pipeline.pipelineCode}"></span>/execute
                    </small>
                </td>
                <td th:text="${pipeline.description}"></td>
                <td>
                    <span class="badge" th:classappend="${pipeline.status == 1} ? 'bg-success' : 'bg-danger'"
                          th:text="${pipeline.status == 1} ? '启用' : '禁用'"></span>
                </td>
                <td th:text="${pipeline.createdAt != null ? #temporals.format(pipeline.createdAt, 'yyyy-MM-dd HH:mm') : ''}"></td>
                <td>
                    <a th:href="@{/page/pipeline/{id}/edit(id=${pipeline.id})}" class="btn btn-sm btn-outline-secondary">编辑</a>
                    <a th:href="@{/page/pipeline/{id}/test(id=${pipeline.id})}" class="btn btn-sm btn-outline-success">测试</a>
                    <button class="btn btn-sm btn-outline-danger"
                            th:attr="onclick=|deletePipeline(${pipeline.id})|">删除</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<script>
function deletePipeline(id) {
    if (!confirm('确定要删除这个编排吗？')) return;
    fetch('/pipeline-def/' + id, { method: 'DELETE' })
        .then(res => res.json())
        .then(data => {
            if (data.code === 0) {
                location.reload();
            } else {
                alert('删除失败: ' + data.msg);
            }
        });
}
</script>
